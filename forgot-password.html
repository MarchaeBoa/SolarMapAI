<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha — SolarMap AI</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <!-- Cosmic Background -->
    <div class="cosmic-bg">
        <div class="cosmic-stars"></div>
        <div class="energy-orbs" id="energyOrbs"></div>
    </div>

    <div class="auth-page">
        <a href="index.html" style="position:fixed;top:24px;left:24px;z-index:100;background:rgba(6,12,20,0.85);backdrop-filter:blur(12px);border:1px solid rgba(238,244,255,0.1);border-radius:12px;padding:10px 20px;color:var(--ice);text-decoration:none;font-size:0.85rem;font-weight:600;display:flex;align-items:center;gap:8px;">← Voltar ao site</a>
        <div class="auth-card">

            <a href="login.html" class="auth-back">&larr; Voltar ao login</a>

            <div class="auth-logo">Solar Map AI &#9728;</div>

            <h1 class="auth-title">Recuperar senha</h1>
            <p class="auth-subtitle">Digite seu e-mail e enviaremos um link para redefinir sua senha.</p>

            <div id="authAlert" class="auth-alert" style="display:none;"></div>

            <form id="forgotForm" class="auth-form">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>

                <button type="submit" class="auth-btn">Enviar link de recuperação</button>
            </form>

            <div class="auth-footer">
                Lembrou a senha? <a href="login.html">Entrar</a>
            </div>

        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- App Scripts -->
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/guard.js"></script>

    <script>
        // Generate 100 energy orbs
        (function () {
            const container = document.getElementById('energyOrbs');
            for (let i = 0; i < 100; i++) {
                const orb = document.createElement('div');
                orb.classList.add('orb');
                orb.style.left = Math.random() * 100 + '%';
                orb.style.top = Math.random() * 100 + '%';
                orb.style.animationDelay = Math.random() * 5 + 's';
                orb.style.animationDuration = (3 + Math.random() * 4) + 's';
                container.appendChild(orb);
            }
        })();

        // Form handler
        document.getElementById('forgotForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const alertBox = document.getElementById('authAlert');
            const email = document.getElementById('email').value.trim();

            alertBox.style.display = 'none';
            alertBox.className = 'auth-alert';

            try {
                await authResetPassword(email);

                alertBox.textContent = 'Email enviado! Verifique sua caixa de entrada.';
                alertBox.classList.add('auth-alert-success');
                alertBox.style.display = 'block';
            } catch (err) {
                alertBox.textContent = err.message || 'Erro ao enviar e-mail de recuperação.';
                alertBox.classList.add('auth-alert-error');
                alertBox.style.display = 'block';
            }
        });

        // Generate energy orbs
        (function(){const c=document.getElementById('energyOrbs');if(!c)return;const t=['orb--gold','orb--green','orb--white','orb--orange','orb--blue'];for(let i=0;i<150;i++){const o=document.createElement('div');const s=Math.random()*10+2;const d=Math.random()*25+6;const dl=Math.random()*20;const dx=(Math.random()-0.5)*400;const a=i%3;let an;if(a===0){an=`orbDrift ${d}s ${dl}s linear infinite`;o.style.setProperty('--drift-x',dx+'px');}else if(a===1){an=`orbPulse ${Math.random()*5+2}s ${dl}s ease-in-out infinite`;}else{o.style.setProperty('--dx',(Math.random()-0.5)*300+'px');o.style.setProperty('--dy',(Math.random()-0.5)*300+'px');o.style.setProperty('--dx2',(Math.random()-0.5)*400+'px');o.style.setProperty('--dy2',(Math.random()-0.5)*400+'px');o.style.setProperty('--scale-mid',(Math.random()*1.2+0.6).toFixed(2));an=`orbFloat ${d}s ${dl}s ease-in-out infinite`;}o.className='orb '+t[i%5];o.style.cssText+=`width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation:${an};`;c.appendChild(o);}})();
    </script>

</body>
</html>
